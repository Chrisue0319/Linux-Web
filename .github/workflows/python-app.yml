# Linux Storage Manager - GitHub Actions CI 工作流
# 作者：李泽源、谢子墨
# 课程：武汉大学开源软件与技术课程 2026
# 许可证：MIT
#
# 触发条件：main 分支的 push 和 pull_request
# 执行任务：安装依赖、flake8 语法检查、pytest 测试

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # 对 app、src、tests 进行语法和风格检查
        # 第一行：遇到语法错误或未定义名称时立即失败
        flake8 app src tests --count --select=E9,F63,F7,F82 --show-source --statistics
        # 第二行：其他风格问题作为警告输出，不中断构建
        flake8 app src tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        pytest tests/ -v -W ignore
